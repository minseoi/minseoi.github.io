# SITE CONFIGURATION
title: minseoi # your site title
author: minseoi # You :P
description: > # Meta description of Homepage
  minseoi's blog
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://minseoi.github.io/" # the base hostname & protocol for your site, e.g. http://example.com

# SEO PLUGIN
social:
  name: minseoi
  links:
    - https://www.linkedin.com/in/minseoi
    - https://github.com/minseoi

# THEME SETTINGS
navigation: # Navigation links
  - {name: 'Blog', link: '/'}
  - {name: 'About', link: '/about'}

tagline: >
  My Blog

hero_img: posts/sleek_lg.jpg # Main background image: use the path from /assets/img/ => This will output /assets/img/posts/sleek_lg.jpg

github_username:  minseoi # replace with your_github_username or comment to remove link from footer
instagram_username: minseoi.cc # replace with your_instagram_username or comment to remove link from footer

# google_tag_manager: GTM-XXXXXXX # Uncomment to enable GTM. Replace GTM-XXXXXXX with your GTM container ID

service_worker: true

# BUILD SETTINGS
markdown: kramdown
highlighter: rouge # or pygments or null
# theme: jekyll-sleek # Uncomment if you're using the theme as a ruby gem
exclude:
  - README.md
  - node_modules
  - script
  - package.json
  - package-lock.json
  - Gemfile
  - Gemfile.lock
  - vendor
  - npm-debug.log
  - gulpfile.js
  - sleek.jpg

include: ['_pages']
permalink: /:title/

compress_html:
  clippings: all

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
