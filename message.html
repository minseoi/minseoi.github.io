<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>폼</title>
    <link rel="stylesheet" href="./resource/styles2.css">
</head>

<body>
    <div class="container">
        <h2>Message</h2>
        <form action="#" method="post">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Location: </label>
                <input type="radio" id="kor" name="loc" value="kor" required>
                <label for="nkor">Korea</label>
                <input type="radio" id="nkor" name="loc" value="nkor" required>
                <label for="nkor">Global</label>
            </div>
            <div class="form-group">
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="4" required></textarea>
            </div>
            <div class="form-group">
                <button type="submit">Send</button>
            </div>
            <div class="form-group">
                <i style="color: gray;">this is fake form</i>
            </div>
        </form>
    </div>
</body>
</html>
